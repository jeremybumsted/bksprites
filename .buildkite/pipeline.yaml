agents:
  queue: sprites
steps:
  - wait: ~
  - label: ":golangci-lint: Lint"
    command: .buildkite/scripts/lint.sh
  - label: ":go: :test_tube: Test"
    command: .buildkite/scripts/tests.sh
    secrets:
      BUILDKITE_ANALYTICS_TOKEN: SPRITES_SUITE_TOKEN
    plugins:
      - test-collector#v1.11.0:
          files: "*.xml"
          format: "junit"

  # Binary builds with goreleaser
  # Auto-detects release mode:
  #   - No tag: Snapshot build (binaries in dist/, uploaded to Buildkite artifacts)
  #   - With tag (e.g., v1.0.0): Full release (publishes to GitHub Releases)
  #
  # Requirements:
  #   - GITHUB_API_TOKEN only needed for tag/release builds (with contents:write permission)
  #   - Snapshot builds work without GITHUB_API_TOKEN
  - label: ":package: Build {{matrix.os}}/{{matrix.arch}}"
    command: .buildkite/scripts/release.sh
    matrix:
      setup:
        os: [linux, darwin, windows]
        arch: [amd64, arm64]
      adjustments:
        # Windows doesn't support arm64 well
        - with: {os: windows, arch: arm64}
          skip: true
    env:
      GOOS: "{{matrix.os}}"
      GOARCH: "{{matrix.arch}}"
    # Only needed for tag builds:
    # secrets:
    #   GITHUB_API_TOKEN: GITHUB_RELEASE_TOKEN

  # Container image builds with ko
  # Auto-detects release mode:
  #   - No tag: Local Docker build (image stored in Docker daemon, not pushed)
  #   - With tag (e.g., v1.0.0): Push to registry (multi-arch + latest tag)
  #
  # Requirements:
  #   - GITHUB_API_TOKEN only needed for tag/release builds (with packages:write permission)
  #   - Local builds work without GITHUB_API_TOKEN (builds to local Docker)
  - label: ":docker: Build Container Image"
    command: .buildkite/scripts/build.sh
    env:
      KO_DOCKER_REPO: ghcr.io/jeremybumsted/bksprites
    # Only needed for tag builds:
    # secrets:
    #   GITHUB_API_TOKEN: GITHUB_CR_TOKEN
