# ko configuration for building bksprites container images
# See: https://ko.build/configuration/

# Default base image - using Chainguard static for minimal, secure images
defaultBaseImage: cgr.dev/chainguard/static:latest

# Default repository for pushing images
# Override with KO_DOCKER_REPO environment variable
defaultRepository: ghcr.io/jeremybumsted/bksprites

# Multi-platform build configuration
# Builds for both amd64 and arm64 architectures
defaultPlatforms:
  - linux/amd64
  - linux/arm64

# Build configuration
builds:
  - id: bksprites
    main: .
    # Use static linking for compatibility with distroless/static base
    env:
      - CGO_ENABLED=0
    # Go build flags for optimization
    flags:
      - -trimpath
    ldflags:
      - -s
      - -w
      - -extldflags=-static
